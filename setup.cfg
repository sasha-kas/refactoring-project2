[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --cov=src --cov-report=html:htmlcov --cov-report=xml:coverage.xml --cov-report=term-missing --cov-fail-under=70 --junitxml=junit.xml

[coverage:run]
source = src
omit = */tests/*

[coverage:report]
show_missing = True
skip_covered = False
